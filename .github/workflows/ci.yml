name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

jobs:
  go:
    name: Go Tests & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - name: Show Go version
        run: go version

      - name: Download dependencies
        run: go mod download

      - name: Run go vet
        run: go vet ./...

      - uses: dominikh/staticcheck-action@v1.4.1
        with:
          version: latest

      - name: Run tests with coverage
        run: |
          go test -race -count=1 \
            -covermode=atomic \
            -coverprofile=coverage-go.out \
            ./...

      - name: Run vulnerability check
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

      - name: Upload Go coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-go
          path: coverage-go.out


  lynx:
    name: Rust Tests & Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: lynx

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Show Rust version
        run: |
          rustc --version
          cargo --version

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: lynx

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace --all-targets

      - name: Install tarpaulin
        run: cargo install cargo-tarpaulin

      - name: Generate Rust coverage
        run: cargo tarpaulin --out Lcov --output-dir .

      - name: Move coverage file
        run: mv lynx/lcov.info lcov.info || true

      - name: Upload Rust coverage artifact
        uses: actions/upload-artifact@v4
        with:
          name: coverage-rust
          path: lcov.info


  coverage:
    name: Codecov Upload
    runs-on: ubuntu-latest
    needs: [go, lynx]

    steps:
      - uses: actions/checkout@v4

      - name: Download Go coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-go

      - name: Download Rust coverage
        uses: actions/download-artifact@v4
        with:
          name: coverage-rust

      - name: Upload to Codecov
        uses: codecov/codecov-action@v5
        with:
          files: |
            coverage-go.out
            lcov.info
          fail_ci_if_error: true


  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: [go, lynx]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: lynx

      - name: Build
        run: make build

      - name: Verify binary
        run: ./bin/izen --version


  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: lynx

      - name: Build release binary
        run: make build

      - name: Generate checksums
        run: |
          cd bin
          sha256sum izen > izen_SHA256SUMS.txt

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            bin/izen
            bin/izen_SHA256SUMS.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}