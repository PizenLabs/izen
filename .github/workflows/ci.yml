name: CI

on:
  push:
    branches:
      - main
      - develop

  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

env:
  GO_VERSION: stable

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Show Go version
        run: go version

      - name: Download dependencies
        run: go mod download

      - name: Verify modules
        run: go mod verify

      - name: Run go vet
        run: go vet ./...

      - name: Run staticcheck
        uses: dominikh/staticcheck-action@v1.4.1
        with:
          version: latest

      - name: Run tests with coverage
        run: |
          go test \
            -race \
            -count=1 \
            -covermode=atomic \
            -coverprofile=coverage-go.out \
            ./...

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Run govulncheck
        run: govulncheck ./...

      - name: Upload Go coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-go
          path: coverage-go.out
          if-no-files-found: error
          retention-days: 1

  rust:
    name: Rust
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: lynx

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: lynx

      - name: Install cargo-tarpaulin
        uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin

      - name: Show Rust version
        run: |
          rustc --version
          cargo --version

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run Clippy
        run: cargo clippy --workspace --all-targets --locked -- -D warnings

      - name: Run tests
        run: cargo test --workspace --all-targets --locked

      - name: Generate coverage
        run: cargo tarpaulin --workspace --locked --out Lcov --output-dir .

      - name: Verify coverage output
        run: |
          echo "Working directory:"
          pwd

          echo
          echo "Directory contents:"
          ls -lah

          echo
          echo "Checking lcov.info..."
          test -f lcov.info

      - name: Upload Rust coverage
        uses: actions/upload-artifact@v7
        with:
          name: coverage-rust
          path: lynx/lcov.info
          if-no-files-found: error
          retention-days: 1

  build:
    name: Build
    needs:
      - go
      - rust

    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      - name: Setup Go
        uses: actions/setup-go@v6
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Restore Rust cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: lynx

      - name: Build project
        run: make build

      - name: Verify binary
        run: ./bin/izen --version
