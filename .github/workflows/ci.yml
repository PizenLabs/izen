name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

permissions:
  contents: read

env:
  GO_VERSION: "1.24.6"
  GOLANGCI_LINT_VERSION: "latest"

jobs:
  go:
    name: Go Test + Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      # -------------------------
      # Go setup
      # -------------------------
      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      # -------------------------
      # Go cache (extra boost)
      # -------------------------
      - name: Cache Go build
        uses: actions/cache@v4
        with:
          path: |
            ~/.cache/go-build
            ~/go/pkg/mod
          key: go-${{ runner.os }}-${{ hashFiles('**/go.sum') }}

      - run: go version
      - run: go mod download
      - run: go mod verify

      # -------------------------
      # golangci-lint cached install
      # -------------------------
      - name: Cache golangci-lint
        id: cache-lint
        uses: actions/cache@v4
        with:
          path: |
            ~/go/bin/golangci-lint
          key: golangci-lint-${{ runner.os }}-${{ env.GOLANGCI_LINT_VERSION }}

      - name: Install golangci-lint
        if: steps.cache-lint.outputs.cache-hit != 'true'
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/master/install.sh \
            | sh -s ${{ env.GOLANGCI_LINT_VERSION }}
          mkdir -p ~/go/bin
          mv ./bin/golangci-lint ~/go/bin/

      - name: Add golangci-lint to PATH
        run: echo "$HOME/go/bin" >> $GITHUB_PATH

      - name: Run golangci-lint
        run: golangci-lint run --timeout=5m

      # -------------------------
      # Tests
      # -------------------------
      - run: |
          go test \
            -race \
            -count=1 \
            -covermode=atomic \
            -coverprofile=coverage-go.out \
            ./...

      # -------------------------
      # Security scan
      # -------------------------
      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

      # -------------------------
      # Artifacts
      # -------------------------
      - uses: actions/upload-artifact@v4
        with:
          name: coverage-go
          path: coverage-go.out
          if-no-files-found: error
          retention-days: 1

  rust:
    name: Rust Test + Lint
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: lynx

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy

      - name: Cache Rust
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: lynx

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin

      - run: |
          rustc --version
          cargo --version

      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo test --workspace --all-targets --locked

      - run: cargo tarpaulin --workspace --locked --out Lcov --output-dir .
      - run: test -f lcov.info

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-rust
          path: lynx/lcov.info
          if-no-files-found: error
          retention-days: 1

  build:
    name: Build Binary
    needs: [go, rust]
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: lynx

      - run: make build
      - run: ./bin/izen --version

  debug:
    name: Debug (optional)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: |
          echo "===== GITHUB ====="
          echo "SHA: $GITHUB_SHA"
          git rev-parse HEAD
          git log --oneline -1

          echo
          echo "===== STATUS ====="
          git status

          echo
          echo "===== SEARCH ====="
          grep -R "func wrapText" internal || true
          grep -R "func formatCompactField" internal || true

          echo
          echo "===== UTILS ====="
          sed -n '1,120p' internal/ui/utils.go
