name: CI

on:
  push:
    branches:
      - main
      - develop
  pull_request:
    branches:
      - main
      - develop

permissions:
  contents: read

env:
  GO_VERSION: stable

jobs:
  go:
    name: Go
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - run: go version
      - run: go mod download
      - run: go mod verify

      - uses: golangci/golangci-lint-action@v6
        with:
          version: latest
          args: --timeout=5m

      - run: |
          go test \
            -race \
            -count=1 \
            -covermode=atomic \
            -coverprofile=coverage-go.out \
            ./...

      - run: go install golang.org/x/vuln/cmd/govulncheck@latest
      - run: govulncheck ./...

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-go
          path: coverage-go.out
          if-no-files-found: error
          retention-days: 1

  rust:
    name: Rust
    runs-on: ubuntu-latest
    timeout-minutes: 20

    defaults:
      run:
        working-directory: lynx

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt,clippy

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: lynx

      - uses: taiki-e/install-action@v2
        with:
          tool: cargo-tarpaulin

      - run: |
          rustc --version
          cargo --version

      - run: cargo fmt --all -- --check
      - run: cargo clippy --workspace --all-targets --locked -- -D warnings
      - run: cargo test --workspace --all-targets --locked

      - run: cargo tarpaulin --workspace --locked --out Lcov --output-dir .
      - run: test -f lcov.info

      - uses: actions/upload-artifact@v4
        with:
          name: coverage-rust
          path: lynx/lcov.info
          if-no-files-found: error
          retention-days: 1

  build:
    name: Build
    needs: [go, rust]
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: lynx

      - run: make build
      - run: ./bin/izen --version

  debug:
    name: Debug Checkout
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - run: |
          echo "===== GITHUB ====="
          echo "GITHUB_SHA=$GITHUB_SHA"
          git rev-parse HEAD
          git log --oneline -1

          echo
          echo "===== STATUS ====="
          git status

          echo
          echo "===== SEARCH ====="
          grep -R "func wrapText" internal || true
          grep -R "func formatCompactField" internal || true

          echo
          echo "===== UTILS ====="
          sed -n '1,120p' internal/ui/utils.go
