name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main, develop]

jobs:
  go:
    name: Go Tests & Lint
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - name: Show Go version
        run: go version

      - name: Download dependencies
        run: go mod download

      - name: Run go vet
        run: go vet ./...

      - uses: dominikh/staticcheck-action@v1.4.1
        with:
          version: latest

      - name: Run tests
        run: go test -race -count=1 ./...

      - uses: golang/govulncheck-action@v1
        with:
          go-version-input: go.mod

  lynx:
    name: Rust Tests & Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: lynx

    steps:
      - uses: actions/checkout@v4

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - name: Show Rust version
        run: |
          rustc --version
          cargo --version

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            lynx

      - name: Check formatting
        run: cargo fmt --all -- --check

      - name: Run clippy
        run: cargo clippy --workspace --all-targets -- -D warnings

      - name: Run tests
        run: cargo test --workspace --all-targets

  build:
    name: Build Binaries
    runs-on: ubuntu-latest
    needs: [go, lynx]

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            lynx

      - name: Build
        run: make build

      - name: Verify binary
        run: ./bin/izen --version

  release:
    name: Create Release
    if: startsWith(github.ref, 'refs/tags/v')
    needs: build
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v6
        with:
          go-version: stable
          cache: true

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            lynx

      - name: Build release binary
        run: make build

      - name: Generate checksums
        run: |
          cd bin
          sha256sum izen > izen_SHA256SUMS.txt

      - uses: softprops/action-gh-release@v3
        with:
          files: |
            bin/izen
            bin/izen_SHA256SUMS.txt
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
