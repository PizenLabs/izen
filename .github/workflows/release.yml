name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

env:
  GO_VERSION: stable

jobs:
  release:
    name: Release
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v7
        with:
          fetch-depth: 0

      ####################################################
      # Go
      ####################################################

      - name: Setup Go
        uses: actions/setup-go@v7
        with:
          go-version: ${{ env.GO_VERSION }}
          cache: true

      ####################################################
      # Rust
      ####################################################

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2
        with:
          workspaces: lynx

      ####################################################
      # Build
      ####################################################

      - name: Build
        run: make build

      - name: Verify Binary
        run: ./bin/izen --version

      ####################################################
      # Checksums
      ####################################################

      - name: Generate SHA256
        run: |
          cd bin
          sha256sum izen > izen_SHA256SUMS.txt

      ####################################################
      # GitHub Release
      ####################################################

      - name: Publish Release
        uses: softprops/action-gh-release@v3
        with:
          generate_release_notes: true
          prerelease: ${{ contains(github.ref_name, '-beta') || contains(github.ref_name, '-alpha') || contains(github.ref_name, '-rc') }}
          files: |
            bin/izen
            bin/izen_SHA256SUMS.txt
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
