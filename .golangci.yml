version: "2"

run:
  timeout: 5m

linters:
  default: none

  enable:
    - govet
    - staticcheck
    - errcheck
    - errorlint
    - ineffassign
    - unused
    - nilerr

    - noctx
    - contextcheck
    - bodyclose

    - gocritic
    - copyloopvar
    - prealloc
    - misspell

    - revive

  settings:
    revive:
      rules:
        - name: exported
          disabled: true

issues:
  max-issues-per-linter: 0
  max-same-issues: 0

formatters:
  enable:
    - gofmt
    - goimports
